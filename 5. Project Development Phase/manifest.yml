# IBM Cloud Foundry deployment manifest.
# Deploy with:  ibmcloud login  →  ibmcloud target --cf  →  ibmcloud cf push
applications:
  - name: rising-waters-flood-prediction
    memory: 256M
    instances: 1
    buildpacks:
      - python_buildpack
    command: gunicorn --chdir app --bind 0.0.0.0:$PORT app:app
